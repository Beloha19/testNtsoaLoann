<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <h2>Connexion</h2>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="Votre email"
        [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
      />
      <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error">
        <span *ngIf="loginForm.get('email')?.errors?.['required']">L'email est requis</span>
        <span *ngIf="loginForm.get('email')?.errors?.['email']">Format d'email invalide</span>
      </div>
    </div>

    <div class="form-group">
      <label for="mdp">Mot de passe</label>
      <input
        type="password"
        id="mdp"
        formControlName="mdp"
        placeholder="Votre mot de passe"
        [class.is-invalid]="loginForm.get('mdp')?.invalid && loginForm.get('mdp')?.touched"
      />
      <div *ngIf="loginForm.get('mdp')?.invalid && loginForm.get('mdp')?.touched" class="error">
        Le mot de passe est requis
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="loading || loginForm.invalid">
      <span *ngIf="loading">Connexion en cours...</span>
      <span *ngIf="!loading">Se connecter</span>
    </button>
    <p class="register-link">
      Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
    </p>
  </form>
</div>
